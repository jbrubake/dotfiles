imports: 
  cdlog: ./
  ls_colors: ./
  gdb-dashboard: ./
  irssi-colors-solarized: ./irssi
  mutt-bgedit: ./mutt/scripts
  nerd-fonts: ./config/fontconfig/conf.d
  redact_pass: ./vim/pack/manual/start
  todo-txt-view: ./todo/actions.d

git module cdlog: # Better directory changing for Bash
  url: https://www.kylheku.com/git/cdlog
  move:
    README.md: README.cdlog.md
  rev: 38e65cfbec05fc4baabed8a24d6692dfad78ba5c

git module ls_colors:
  url: https://github.com/trapd00r/LS_COLORS
  move:
    LS_COLORS: dircolors
  pick: dircolors
  rev: 810ce8cac886ac50e75d84fb438b549a1f9478ee

git module gdb-dashboard:
  url: https://github.com/cyrus-and/gdb-dashboard
  move:
    .gdbinit: gdbinit
  pick: gdbinit
  rev: c429e144eabf7a2c4c33ffbd617f54f752a7e614

git module irssi-colors-solarized:
  url: https://github.com/huyz/irssi-colors-solarized
  pick: solarized-universal.theme
  rev: 83972b9ca9e5d7194e513024d9fbe9ac2c2a8a62

curl module mutt-bgedit:
  url: https://gitlab.com/muttmua/mutt/-/raw/master/contrib/bgedit-screen-tmux.sh
  filename: mutt-bgedit
  executable: mutt-bgedit
  sha1: 9320ae9acaff3ce99f530d3a99f5daaacda39edb

# NOTE: The git repo is huge so using curl is faster
curl module nerd-fonts:
  url: https://raw.githubusercontent.com/ryanoasis/nerd-fonts/refs/heads/master/10-nerd-font-symbols.conf
  filename: 10-nerd-font-symbols.conf
  sha1: cd970c45564e67d56014c6d18a8bdcf140a4e497

git module redact_pass:
  url: https://git.zx2c4.com/password-store
  move:
    contrib/vim/redact_pass.txt: redact_pass/doc/redact_pass.txt
    contrib/vim/redact_pass.vim: redact_pass/plugin/redact_pass.vim
  pick:
    - redact_pass/doc/redact_pass.txt
    - redact_pass/plugin/redact_pass.vim
  rev: 3ca13cd8882cae4083c1c478858adbf2e82dd037

git module todo-txt-view:
  url: https://github.com/todotxt/plugin-view
  move:
    README.md: README-view.md
  executable:
    - view
    - v
  rev: 2dde46101f36e680273bffa8b5394b5ac2494fac

